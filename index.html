<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlyOS | The Edge Intelligence Infrastructure by Belto</title>
<meta name="description" content="SlyOS by Belto Inc. is the infrastructure for deploying local AI models to edge devices. Zero latency, 100% privacy, WebGPU enabled.">
<meta name="keywords" content="Edge AI, On-Device LLM, SLM, Belto, SlyOS, Local Inference, SDK, WebGPU, VoiceCore, Quantum">
<meta name="author" content="Belto Inc.">
<meta name="theme-color" content="#FF4D00">
<meta property="og:type" content="website">
<meta property="og:title" content="SlyOS - Intelligence at the Edge">
<meta property="og:description" content="Run powerful AI models directly on user devices. The complete infrastructure by Belto Inc.">
<meta property="og:image" content="./newnew.png">
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#050505;--fg:#c8c8c8;--accent:#FF4D00;--dim:#555;--border:#1a1a1a;
--green:#4ade80;--blue:#60a5fa;--yellow:#facc15;--red:#f87171;--purple:#c084fc;
--cyan:#22d3ee;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--fg);font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.6}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* ── BOOT ── */
#boot{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .6s ease}
#boot.done{opacity:0;pointer-events:none}
#boot-text{text-align:left;max-width:520px;padding:20px}
#boot-text .line{opacity:0;transform:translateY(4px);transition:all .35s ease;white-space:pre}
#boot-text .line.show{opacity:1;transform:translateY(0)}
.b-a{color:var(--accent);font-weight:700}
.b-d{color:var(--dim)}
.b-g{color:var(--green)}
.b-w{color:#fff;font-weight:700}
.cursor{display:inline-block;width:7px;height:14px;background:var(--accent);animation:blink 1s step-end infinite;vertical-align:middle;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── SHELL ── */
#shell{display:none;height:100vh;height:100dvh;flex-direction:column}
#shell.active{display:flex}
#topbar{
  height:40px;min-height:40px;display:flex;align-items:center;
  padding:0 12px;border-bottom:1px solid var(--border);background:#0a0a0a;gap:8px;
}
.dots{display:flex;gap:6px;flex-shrink:0}
.dot{width:10px;height:10px;border-radius:50%}
.dot-r{background:#ff5f57}.dot-y{background:#febc2e}.dot-g{background:#28c840}
#topbar-center{flex:1;text-align:center;font-size:10px;color:var(--dim);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;letter-spacing:.04em}
#topbar-wl{color:var(--accent);font-weight:600}
#topbar-right{display:flex;gap:10px;font-size:10px;flex-shrink:0}
#topbar-right a{color:var(--dim);text-decoration:none;transition:color .2s}
#topbar-right a:hover{color:var(--accent)}

/* ── OUTPUT ── */
#output{flex:1;overflow-y:auto;padding:16px;scroll-behavior:smooth}
.msg{margin-bottom:14px;max-width:780px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.msg-user{color:var(--accent)}
.msg-user::before{content:'> ';color:var(--dim)}
.msg-bot{color:var(--fg)}
.msg-bot h2{color:#fff;font-size:14px;font-weight:700;margin:10px 0 4px;text-transform:uppercase;letter-spacing:.04em}
.msg-bot h3{color:var(--accent);font-size:12px;font-weight:600;margin:8px 0 3px}
.msg-bot p{margin:3px 0;font-size:12px}
.msg-bot ul{margin:3px 0 3px 16px;list-style:none}
.msg-bot ul li{font-size:12px}
.msg-bot ul li::before{content:'> ';color:var(--accent)}
.msg-bot a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(255,77,0,.3)}
.msg-bot a:hover{color:#fff;border-color:#fff}
.msg-bot code{background:#111;padding:1px 5px;border-radius:3px;font-size:11px;color:var(--cyan)}
.hl{color:var(--accent);font-weight:600}
.dm{color:var(--dim)}
.d{border:none;border-top:1px solid var(--border);margin:10px 0}

/* cards */
.card{background:#0a0a0a;border:1px solid var(--border);border-radius:5px;padding:10px;margin:6px 0;transition:border-color .2s}
.card:hover{border-color:var(--accent)}
.card-t{color:#fff;font-weight:600;font-size:12px}
.card-m{color:var(--dim);font-size:9px;margin-top:1px;letter-spacing:.03em;text-transform:uppercase}
.card-d{color:var(--fg);font-size:11px;margin-top:3px}
.st{display:inline-block;background:#111;border:1px solid var(--border);padding:2px 7px;border-radius:3px;margin:2px 3px 2px 0;font-size:10px}
.st-l{color:var(--dim)}.st-v{color:#fff;font-weight:600}
.tag{display:inline-block;font-size:8px;padding:1px 5px;border-radius:2px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-right:3px}
.tag-ok{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.18)}
.tag-soon{background:rgba(255,255,255,.03);color:var(--dim);border:1px solid var(--border)}
.tag-rec{background:rgba(255,77,0,.1);color:var(--accent);border:1px solid rgba(255,77,0,.18)}
.tag-blue{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.18)}

/* code */
.cb{background:#0a0a0a;border:1px solid var(--border);border-radius:5px;padding:10px;margin:6px 0;overflow-x:auto;font-size:11px;line-height:1.5;white-space:pre}
.cm{color:var(--dim)}.kw{color:var(--purple)}.str{color:var(--green)}.fn{color:var(--cyan)}.num{color:var(--yellow)}

/* ascii */
.ascii{font-size:10px;line-height:1.3;color:var(--dim);margin:6px 0;overflow-x:auto;white-space:pre}
.ascii .aa{color:var(--accent)}.ascii .ag{color:var(--green)}.ascii .ab{color:var(--blue)}.ascii .aw{color:#fff}

/* bars */
.bar-wrap{margin:4px 0}
.bar-label{font-size:10px;color:var(--dim);display:flex;justify-content:space-between;margin-bottom:2px}
.bar{height:6px;border-radius:3px;background:#111;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;width:0;transition:width 1s ease}

/* model grid */
.mgrid{display:grid;grid-template-columns:1fr;gap:6px;margin:6px 0}

/* suggestions */
#suggestions{padding:4px 12px 6px;display:flex;flex-wrap:wrap;gap:5px;min-height:30px}
.sug{
  background:#111;border:1px solid var(--border);color:var(--fg);
  font-family:inherit;font-size:10px;padding:4px 10px;border-radius:4px;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.sug:hover{border-color:var(--accent);color:var(--accent);background:#0f0800}

/* input */
#inputbar{
  display:flex;align-items:center;gap:6px;
  padding:10px 12px;border-top:1px solid var(--border);background:#0a0a0a;
}
#pp{color:var(--accent);font-weight:700;font-size:14px;user-select:none;flex-shrink:0}
#prompt{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--fg);font-family:inherit;font-size:13px;caret-color:var(--accent);min-width:0;
}
#prompt::placeholder{color:#333}
#sbtn{
  background:none;border:1px solid var(--border);color:var(--dim);
  font-family:inherit;font-size:10px;padding:4px 10px;border-radius:4px;
  cursor:pointer;transition:all .15s;flex-shrink:0;
}
#sbtn:hover{border-color:var(--accent);color:var(--accent)}

/* forms */
.ifrm{margin:6px 0}
.ifrm label{display:block;color:var(--dim);font-size:9px;text-transform:uppercase;letter-spacing:.06em;margin:6px 0 2px}
.ifrm input,.ifrm select{
  display:block;width:100%;max-width:340px;background:#0a0a0a;border:1px solid var(--border);
  border-radius:4px;padding:7px 9px;color:#fff;font-family:inherit;font-size:11px;
  outline:none;transition:border-color .2s;
}
.ifrm input:focus,.ifrm select:focus{border-color:var(--accent)}
.ifrm select{cursor:pointer;-webkit-appearance:none}
.ifrm button{
  margin-top:10px;background:var(--accent);color:#fff;border:none;
  padding:7px 20px;border-radius:4px;font-family:inherit;font-size:11px;
  font-weight:600;cursor:pointer;transition:transform .1s;
}
.ifrm button:hover{transform:scale(1.02)}
.ifrm button:active{transform:scale(.98)}

/* command tiles */
.tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:10px 0}
.tile{
  background:#0a0a0a;border:1px solid var(--border);border-radius:6px;
  padding:10px 12px;cursor:pointer;transition:all .2s;
  display:flex;align-items:flex-start;gap:10px;text-align:left;
  font-family:inherit;color:var(--fg);position:relative;overflow:hidden;
}
.tile:hover{border-color:var(--accent);background:#0d0700;transform:translateY(-1px)}
.tile:active{transform:translateY(0)}
.tile-icon{
  font-size:18px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:5px;flex-shrink:0;line-height:1;
}
.tile-body{flex:1;min-width:0}
.tile-label{color:#fff;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
.tile-desc{color:var(--dim);font-size:9px;margin-top:2px;line-height:1.3}
.tile-arrow{position:absolute;top:10px;right:10px;color:var(--border);font-size:10px;transition:color .2s}
.tile:hover .tile-arrow{color:var(--accent)}
.tile-primary{border-color:rgba(255,77,0,.25);background:rgba(255,77,0,.04)}
.tile-primary:hover{background:rgba(255,77,0,.08);border-color:var(--accent)}
.tile-primary .tile-icon{background:rgba(255,77,0,.12);color:var(--accent)}

/* ── RESPONSIVE ── */
@media(min-width:600px){
  .mgrid{grid-template-columns:1fr 1fr}
  .tile-grid{grid-template-columns:1fr 1fr 1fr}
  #output{padding:20px 24px 8px}
  #suggestions{padding:4px 24px 6px}
  #inputbar{padding:10px 20px}
  #topbar{padding:0 16px}
  .ascii{font-size:11px}
}
@media(min-width:900px){
  .mgrid{grid-template-columns:1fr 1fr 1fr}
  .tile-grid{grid-template-columns:1fr 1fr 1fr 1fr}
  #output{padding:20px 32px 8px}
}
@media(max-width:599px){
  #topbar-right{display:none}
  body{font-size:12px}
  .msg-bot h2{font-size:13px}
  .msg-bot p,.msg-bot ul li{font-size:11px}
  .card{padding:8px}
  .cb{font-size:10px;padding:8px}
  .ascii{font-size:8px;line-height:1.2}
  #topbar-center{font-size:9px}
  .tile-grid{grid-template-columns:1fr 1fr}
  .tile{padding:8px 10px;gap:8px}
  .tile-icon{width:28px;height:28px;font-size:15px}
  .tile-label{font-size:10px}
  .tile-desc{font-size:8px}
}
</style>
</head>
<body>

<div id="boot"><div id="boot-text"></div></div>

<div id="shell">
<div id="topbar">
  <div class="dots"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div></div>
  <div id="topbar-center"><span id="topbar-wl"></span> slyos@belto ~ v1.0</div>
  <div id="topbar-right">
    <a href="https://dashboard-khaki-iota-54.vercel.app" target="_blank">log in</a>
    <a href="https://zenodo.org/records/19041422" target="_blank">research</a>
    <a href="mailto:support@belto.world">email us</a>
  </div>
</div>
<div id="output"></div>
<div id="suggestions"></div>
<div id="inputbar">
  <span id="pp">&#10095;</span>
  <input id="prompt" type="text" placeholder="ask me anything or click a button above..." autocomplete="off" autofocus spellcheck="false">
  <button id="sbtn">&#8594;</button>
</div>
</div>

<script>
const MODELS=[
  {name:'Quantum 135M',id:'quantum-135m',size:'80MB',ram:'250MB',speed:'50-60 t/s',desc:'Autocomplete, simple chat.',rec:false,type:'text'},
  {name:'Quantum 360M',id:'quantum-360m',size:'200MB',ram:'512MB',speed:'40-50 t/s',desc:'General chat, Q&A, content gen.',rec:true,type:'text'},
  {name:'Quantum 1.7B',id:'quantum-1.7b',size:'1GB',ram:'2GB',speed:'25-35 t/s',desc:'Complex reasoning, analysis.',rec:false,type:'text'},
  {name:'Quantum 3B',id:'quantum-3b',size:'1.7GB',ram:'4GB',speed:'15-25 t/s',desc:'Advanced chat, research.',rec:false,type:'text'},
  {name:'Quantum Code 3B',id:'quantum-code-3b',size:'1.8GB',ram:'4GB',speed:'16-25 t/s',desc:'Code gen, debug, refactor.',rec:true,type:'code'},
  {name:'Quantum 8B',id:'quantum-8b',size:'4.5GB',ram:'8GB',speed:'8-15 t/s',desc:'Professional writing. Desktop.',rec:false,type:'text'},
  {name:'VoiceCore Tiny',id:'voicecore-tiny',size:'128MB',ram:'128MB',speed:'0.2x RT',desc:'Voice commands, subtitles.',rec:false,type:'voice'},
  {name:'VoiceCore Base',id:'voicecore-base',size:'256MB',ram:'256MB',speed:'0.3x RT',desc:'Meetings, podcasts.',rec:true,type:'voice'},
  {name:'VoiceCore Small',id:'voicecore-small',size:'512MB',ram:'512MB',speed:'0.5x RT',desc:'High-quality transcription.',rec:false,type:'voice'},
];
const PLATFORMS=[
  {name:'WebGPU (Chrome/Edge)',s:'ready'},
  {name:'Ollama (Desktop)',s:'ready'},
  {name:'iOS (CoreML)',s:'soon'},
  {name:'Android (NNAPI)',s:'soon'},
];
const FAQ=[
  {q:'Model download every time?',a:'No. Weights persist via Cache API + IndexedDB. ~200MB once, then instant.'},
  {q:'Older/unsupported devices?',a:'SDK runs SlyOS.checkCompatibility(). Fallback to cloud API or graceful degradation.'},
  {q:'Battery drain?',a:'Optimized WebGPU shaders. Negligible for short tasks. SDK can check battery for long jobs.'},
  {q:'Are models uncensored?',a:'Zoo models keep original alignment. "Quantum-Code" variants have reduced refusal for dev use cases.'},
];
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbwXTLh0yw8gg6OV8zW2o1djmhlk4T5pt7QIXMuy9l7n8uJAh3Vsc9IMN1rDQnSb4MMF/exec';

// ======== BOOT ========
const bootLines=[
  {t:'<span class="b-d">BELTO INC.</span>',d:0},
  {t:'<span class="b-d">Starting up...</span>',d:350},
  {t:'<span style="color:var(--accent)">████████████████████████</span> <span class="b-g">ready</span>',d:700},
  {t:'',d:950},
  {t:'<span class="b-w" style="font-size:16px">Run AI on your users\' devices.</span>',d:1100},
  {t:'<span class="b-a">No cloud. No per-message fees.</span>',d:1500},
  {t:'',d:1800},
  {t:'<span class="b-d">Type </span><span class="b-a">help</span><span class="b-d"> to begin.</span><span class="cursor"></span>',d:2000},
];
function runBoot(){
  const c=document.getElementById('boot-text');
  bootLines.forEach(l=>{
    const d=document.createElement('div');d.className='line';
    d.innerHTML=l.t||'&nbsp;';c.appendChild(d);
    setTimeout(()=>d.classList.add('show'),l.d);
  });
  setTimeout(()=>{
    document.getElementById('boot').classList.add('done');
    setTimeout(()=>{
      document.getElementById('boot').style.display='none';
      document.getElementById('shell').classList.add('active');
      showWelcome();
      document.getElementById('prompt').focus();
    },600);
  },3400);
}

// ======== ENGINE ========
const out=()=>document.getElementById('output');
function addMsg(html,cls='msg-bot'){
  const d=document.createElement('div');d.className='msg '+cls;d.innerHTML=html;
  out().appendChild(d);out().scrollTop=out().scrollHeight;
  setTimeout(()=>{d.querySelectorAll('.bar-fill[data-w]').forEach(b=>{b.style.width=b.dataset.w})},50);
  return d;
}
function setSug(arr){
  const el=document.getElementById('suggestions');el.innerHTML='';
  arr.forEach(s=>{const b=document.createElement('button');b.className='sug';b.textContent=s;b.onclick=()=>go(s);el.appendChild(b)});
}

function showWelcome(){
  addMsg('<div class="ascii"><span class="aa">  ███████╗██╗  ██╗   ██╗ ██████╗ ███████╗\n  ██╔════╝██║  ╚██╗ ██╔╝██╔═══██╗██╔════╝\n  ███████╗██║   ╚████╔╝ ██║   ██║███████╗\n  ╚════██║██║    ╚██╔╝  ██║   ██║╚════██║\n  ███████║███████╗██║   ╚██████╔╝███████║\n  ╚══════╝╚══════╝╚═╝    ╚═════╝ ╚══════╝</span>\n  <span class="aw">Run AI on your users\' devices.</span> <span class="b-d">No cloud needed.</span></div>' +

'<div style="margin:8px 0;padding:6px 10px;background:rgba(255,77,0,.05);border:1px solid rgba(255,77,0,.12);border-radius:4px;display:inline-flex;align-items:center;gap:6px;font-size:11px">' +
'<span style="color:var(--accent)">&#9679;</span>' +
'<span style="color:var(--accent);font-weight:700" id="welcome-wl-count">...</span>' +
'<span class="dm">people on the waitlist</span></div>' +

'<hr class="d">' +
'<p class="dm" style="font-size:10px;margin-bottom:6px">Pick one, or just type what you need:</p>');

  var tiles=[
    {cmd:'overview',icon:'&#9670;',bg:'rgba(255,77,0,.12)',ic:'var(--accent)',label:'What is SlyOS?',desc:'The 30-second pitch',primary:true},
    {cmd:'why slyos?',icon:'&#9889;',bg:'rgba(74,222,128,.12)',ic:'var(--green)',label:'Why SlyOS?',desc:'Beyond cost savings',primary:true},
    {cmd:'models',icon:'&#9641;',bg:'rgba(96,165,250,.12)',ic:'var(--blue)',label:'See the Models',desc:'9 AI models ready to use'},
    {cmd:'quickstart',icon:'&#9654;',bg:'rgba(74,222,128,.12)',ic:'var(--green)',label:'Get Started',desc:'Set up in 60 seconds'},
    {cmd:'waitlist',icon:'&#9733;',bg:'rgba(255,77,0,.12)',ic:'var(--accent)',label:'Join the Waitlist',desc:'Get early access',primary:true},
    {cmd:'demo',icon:'&#9743;',bg:'rgba(250,204,21,.12)',ic:'var(--yellow)',label:'Book a Demo',desc:'Free 30-min call with us'},
    {cmd:'login',icon:'&#9655;',bg:'rgba(255,255,255,.06)',ic:'var(--fg)',label:'Log In',desc:'Go to your dashboard'},
    {cmd:'faq',icon:'?',bg:'rgba(255,255,255,.06)',ic:'var(--fg)',label:'Common Questions',desc:'Battery, downloads, etc.'},
  ];
  var grid=document.createElement('div');grid.className='tile-grid';
  tiles.forEach(function(t){
    var tile=document.createElement('button');
    tile.className='tile'+(t.primary?' tile-primary':'');
    tile.innerHTML=
      '<div class="tile-icon" style="background:'+t.bg+';color:'+t.ic+'">'+t.icon+'</div>'+
      '<div class="tile-body"><div class="tile-label">'+t.label+'</div><div class="tile-desc">'+t.desc+'</div></div>'+
      '<span class="tile-arrow">&#8250;</span>';
    tile.onclick=function(){go(t.cmd)};
    grid.appendChild(tile);
  });
  out().lastElementChild.appendChild(grid);

  var sec=document.createElement('div');
  sec.style.cssText='margin-top:8px;display:flex;flex-wrap:wrap;gap:4px';
  [{cmd:'architecture',l:'how it works'},{cmd:'platforms',l:'supported devices'},{cmd:'paper',l:'read the research'},{cmd:'privacy',l:'privacy'},{cmd:'terms',l:'terms'},{cmd:'fleet',l:'device monitoring'},{cmd:'clear',l:'clear screen'}].forEach(function(s){
    var b=document.createElement('button');b.className='sug';b.textContent=s.l;b.onclick=function(){go(s.cmd)};sec.appendChild(b);
  });
  out().lastElementChild.appendChild(sec);

  setSug([]);
  out().scrollTop=out().scrollHeight;
  var el=document.getElementById('welcome-wl-count');
  if(el&&window._wlCount)el.textContent=window._wlCount;
}

// ======== ROUTER ========
function go(raw){
  var input=raw.trim();if(!input)return;
  addMsg(input,'msg-user');
  var c=input.toLowerCase().replace(/[^a-z0-9 ]/g,'');
  if(mt(c,['help','commands','menu','home','back','?']))showWelcome();
  else if(mt(c,['overview','about','what is slyos','what','why','pitch','info']))cmdOverview();
  else if(mt(c,['models','model zoo','zoo','lm','lms','model','llm','slm','see the models']))cmdModels();
  else if(mt(c,['quickstart','quick start','get started','setup','install','how','integrate','integration','how it works','pipeline','steps','sdk','start']))cmdQuickstart();
  else if(mt(c,['platforms','platform','runtime','runtimes','support','supported','webgpu','ios','android','ollama','devices','supported devices']))cmdPlatforms();
  else if(mt(c,['architecture','arch','architectures','edge','grid','hybrid','deployment','dual','how it works','under the hood']))cmdArch();
  else if(mt(c,['faq','questions','question','ask','battery','download','uncensored','older devices','cache','common questions']))cmdFAQ();
  else if(mt(c,['waitlist','join','register','signup','sign up','early access','wait list','reserve','join the waitlist']))cmdWaitlist();
  else if(mt(c,['demo','schedule','schedule demo','book','call','meeting','book a demo']))cmdDemo();
  else if(mt(c,['paper','research','whitepaper','white paper','zenodo','read','read the research']))cmdPaper();
  else if(mt(c,['login','log in','console','dashboard','sign in','signin']))cmdLogin();

  var uc=document.getElementById('wli-uc').value;
  if(!fn||!ln||!em){addMsg('<p style="color:var(--red)">Please fill in your name and email.</p>');return}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){addMsg('<p style="color:var(--red)">That email doesn\'t look right. Try again?</p>');return}
  var f=document.getElementById('wl-form');f.innerHTML='<p class="dm">Submitting...</p>';
  try{
    var r=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'signup',first_name:fn,last_name:ln,email:em,company:co,use_case:uc})});
    var d=await r.json();
    if(d.status==='duplicate')f.innerHTML='<p style="color:var(--yellow)">You\'re already on the list!</p>';
    else f.innerHTML='<p style="color:var(--green)">&#10003; You\'re in! Position: <span style="color:#fff;font-weight:700">#'+(d.position||'--')+'</span></p><p class="dm" style="font-size:10px;margin-top:3px">Check your email for confirmation from support@belto.world</p>';
  }catch(e){f.innerHTML='<p style="color:var(--red)">Something went wrong. Try again or email support@belto.world</p>'}
}

function cmdUnknown(i){
  addMsg('<p class="dm">I don\'t understand <span style="color:var(--fg)">"'+i+'"</span>. Try one of these:</p>');
  var quickTiles=[
    {cmd:'overview',label:'What is SlyOS?',desc:'Quick overview'},
    {cmd:'models',label:'See the Models',desc:'Browse what\'s available'},
    {cmd:'quickstart',label:'Get Started',desc:'Set up in 60 seconds'},
    {cmd:'waitlist',label:'Join the Waitlist',desc:'Get early access'},
  ];
  var grid=document.createElement('div');grid.className='tile-grid';
  quickTiles.forEach(function(t){
    var tile=document.createElement('button');tile.className='tile';
    tile.innerHTML='<div class="tile-body"><div class="tile-label">'+t.label+'</div><div class="tile-desc">'+t.desc+'</div></div><span class="tile-arrow">&#8250;</span>';
    tile.onclick=function(){go(t.cmd)};grid.appendChild(tile);
  });
  out().lastElementChild.appendChild(grid);
  setSug(['book a demo','common questions']);
}

// ======== INPUT ========
document.getElementById('prompt').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();go(e.target.value)}});
document.getElementById('sbtn').addEventListener('click',function(){go(document.getElementById('prompt').value)});

// ======== INIT ========
runBoot();
loadWL();
</script>
